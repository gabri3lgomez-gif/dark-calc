name: Build Android APK (TWA)
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 16

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Build Info
        run: |
          echo "Este workflow está listo para configurarse."
          echo "Para usar Bubblewrap en CI se requiere un archivo de configuración 'twa-manifest.json'."
          echo "Recomiendo usar PWABuilder.com para el primer build y luego usar este workflow."
